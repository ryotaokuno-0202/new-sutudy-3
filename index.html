<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lecture Audio Notes</title>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fcf9f2;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0.8),
                rgba(252,249,242,1)
            );
        }

        .header h1 {
            font-size: 2.5rem;
            color: #1a2e40;
            margin-bottom: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .input-text {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .file-input-wrapper {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 6px;
            background: #fafafa;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #5fa3dc;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            display: none;
        }

        .output-box {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 15px;
            white-space: pre-wrap;
            line-height: 1.7;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        ul {
            line-height: 1.8;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>Lecture Audio Notes</h1>
    <p>講義音声をAIで文字起こし＆要約</p>
</div>

<div class="container">

    <div class="card">

        <div class="form-group">
            <label>講義名</label>
            <input
                type="text"
                class="input-text"
                id="lecture-name"
                placeholder="情報理論"
            />
        </div>

        <div class="form-group">
            <label>音声ファイル</label>

            <div class="file-input-wrapper">
                <input
                    type="file"
                    id="audio-input"
                    accept="audio/*,video/*"
                />
            </div>
        </div>

        <button class="submit-btn" id="submit-btn">
            ✨ AIノートを作成する
        </button>

    </div>

    <div class="result-section" id="result-section">

        <div class="card">
            <h2>📝 文字起こし</h2>

            <div class="output-box" id="transcript-output"></div>

            <button
                class="copy-btn"
                onclick="copyText('transcript-output')"
            >
                コピー
            </button>
        </div>

        <div class="card">
            <h2>💡 要約</h2>

            <div class="output-box" id="summary-output"></div>

            <h3>📌 要点</h3>

            <ul id="points-output"></ul>
        </div>

    </div>

</div>

<script>

    // =========================
    // API KEY
    // =========================

    function saveApiKey(key) {
        localStorage.setItem("gemini_api_key", key);
    }

    function getApiKey() {

        let key = localStorage.getItem("gemini_api_key");

        if (!key) {
            key = prompt("Gemini APIキーを入力してください");

            if (key) {
                saveApiKey(key);
            }
        }

        return key;
    }

    // =========================
    // Base64変換
    // =========================

    function fileToBase64(file) {

        return new Promise((resolve, reject) => {

            const reader = new FileReader();

            reader.readAsDataURL(file);

            reader.onload = () => {
                resolve(reader.result.split(",")[1]);
            };

            reader.onerror = reject;

        });

    }

    // =========================
    // Retry付きfetch
    // =========================

    async function fetchWithRetry(url, options, retries = 3) {

        for (let i = 0; i < retries; i++) {

            const response = await fetch(url, options);

            if (response.ok) {
                return response;
            }

            // 503のみリトライ
            if (response.status !== 503) {

                const errText = await response.text();

                throw new Error(
                    `HTTP ${response.status}\n${errText}`
                );
            }

            console.warn(
                `503 retry ${i + 1}/${retries}`
            );

            await new Promise(r => setTimeout(r, 2000));
        }

        throw new Error("Gemini APIが混雑しています");
    }

    // =========================
    // MIME TYPE
    // =========================

    function detectMimeType(file) {

        if (file.type) {
            return file.type;
        }

        const name = file.name.toLowerCase();

        if (name.endsWith(".mp3")) {
            return "audio/mpeg";
        }

        if (name.endsWith(".wav")) {
            return "audio/wav";
        }

        if (name.endsWith(".m4a")) {
            return "audio/mp4";
        }

        if (name.endsWith(".mp4")) {
            return "video/mp4";
        }

        return "audio/mpeg";
    }

    // =========================
    // 文字起こし
    // =========================

    async function generateTranscript(file, apiKey) {

        const base64Audio = await fileToBase64(file);

        const mimeType = detectMimeType(file);

        // 安定性重視で1.5 flash
        const url =
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const body = {

            contents: [
                {
                    parts: [

                        {
                            text:
`この講義音声を日本語で正確に文字起こししてください。
余計な説明は不要です。
文字起こし結果のみを出力してください。`
                        },

                        {
                            inlineData: {
                                mimeType: mimeType,
                                data: base64Audio
                            }
                        }

                    ]
                }
            ]

        };

        const response = await fetchWithRetry(
            url,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            }
        );

        const data = await response.json();

        console.log("Transcript Response:", data);

        if (
            !data.candidates ||
            !data.candidates.length
        ) {

            throw new Error(
                JSON.stringify(data, null, 2)
            );
        }

        return data.candidates[0]
            .content.parts[0].text;
    }

    // =========================
    // 要約
    // =========================

    async function generateSummary(
        transcript,
        apiKey
    ) {

        const url =
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const prompt = `
以下の講義文字起こしを要約してください。

【出力形式】
{
  "summary": "150文字程度の要約",
  "points": [
    "要点1",
    "要点2",
    "要点3"
  ]
}

【講義データ】
${transcript}
`;

        const body = {
            contents: [
                {
                    parts: [
                        {
                            text: prompt
                        }
                    ]
                }
            ]
        };

        const response = await fetchWithRetry(
            url,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            }
        );

        const data = await response.json();

        console.log("Summary Response:", data);

        if (
            !data.candidates ||
            !data.candidates.length
        ) {

            throw new Error(
                JSON.stringify(data, null, 2)
            );
        }

        let raw =
            data.candidates[0]
            .content.parts[0].text.trim();

        // ```json 除去
        raw = raw
            .replace(/^```json/i, "")
            .replace(/^```/, "")
            .replace(/```$/, "")
            .trim();

        return JSON.parse(raw);
    }

    // =========================
    // コピー
    // =========================

    function copyText(id) {

        const text =
            document.getElementById(id).innerText;

        navigator.clipboard.writeText(text);

        alert("コピーしました");
    }

    // =========================
    // UI
    // =========================

    document.addEventListener(
        "DOMContentLoaded",
        () => {

            const submitBtn =
                document.getElementById(
                    "submit-btn"
                );

            const audioInput =
                document.getElementById(
                    "audio-input"
                );

            const resultSection =
                document.getElementById(
                    "result-section"
                );

            const transcriptOutput =
                document.getElementById(
                    "transcript-output"
                );

            const summaryOutput =
                document.getElementById(
                    "summary-output"
                );

            const pointsOutput =
                document.getElementById(
                    "points-output"
                );

            submitBtn.addEventListener(
                "click",
                async () => {

                    try {

                        const apiKey =
                            getApiKey();

                        if (!apiKey) {
                            alert(
                                "APIキーが必要です"
                            );
                            return;
                        }

                        if (
                            !audioInput.files ||
                            !audioInput.files[0]
                        ) {
                            alert(
                                "ファイルを選択してください"
                            );
                            return;
                        }

                        const file =
                            audioInput.files[0];

                        // 10MB制限
                        if (
                            file.size >
                            10 * 1024 * 1024
                        ) {
                            alert(
                                "10MB以下のファイルを使用してください"
                            );
                            return;
                        }

                        submitBtn.disabled = true;

                        submitBtn.innerText =
                            "⏳ AI解析中...";

                        // 文字起こし
                        const transcript =
                            await generateTranscript(
                                file,
                                apiKey
                            );

                        transcriptOutput.innerText =
                            transcript;

                        resultSection.style.display =
                            "block";

                        // 要約
                        const result =
                            await generateSummary(
                                transcript,
                                apiKey
                            );

                        summaryOutput.innerText =
                            result.summary;

                        pointsOutput.innerHTML = "";

                        result.points.forEach(
                            point => {

                                const li =
                                    document.createElement(
                                        "li"
                                    );

                                li.innerText = point;

                                pointsOutput.appendChild(
                                    li
                                );
                            }
                        );

                        alert(
                            "✨ AIノート完成！"
                        );

                    } catch (error) {

                        console.error(error);

                        alert(
`エラーが発生しました。

${error.message}`
                        );

                    } finally {

                        submitBtn.disabled = false;

                        submitBtn.innerText =
                            "✨ AIノートを作成する";
                    }

                }
            );

        }
    );

</script>

</body>
</html>
