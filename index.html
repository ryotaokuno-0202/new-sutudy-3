<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Audio Notes</title>
    <style>
        /* ==========================================
           全体のデザイン（CSS）
           ========================================== */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fcf9f2; /* スクリーンショットのような温かみのあるベージュ */
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* ヘッダー部分 */
        .header {
            text-align: center;
            padding: 60px 20px 40px 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(252,249,242,1));
        }

        .header h1 {
            font-size: 2.5rem;
            color: #1a2e40;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .header p {
            color: #666;
            margin: 5px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* メインコンテンツの器 */
        .container {
            max-width: 800px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
        }

        /* 設定リンクボタン */
        .api-setting-wrapper {
            text-align: right;
            margin-bottom: 20px;
        }

        .api-setting-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .api-setting-btn:hover {
            color: #333;
            text-decoration: underline;
        }

        /* 白いカード（入力・出力エリア共通） */
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card h2 {
            font-size: 1.2rem;
            color: #1a2e40;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* フォーム要素 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #333;
        }

        .input-text {
            width: 100%;
            padding: 12px;
            border: 1px solid #ebdcb9; /* 枠線もトーンを合わせる */
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fffdf9;
            font-size: 1rem;
        }

        /* ファイル選択エリア */
        .file-input-wrapper {
            border: 1px solid #ebdcb9;
            padding: 15px;
            border-radius: 6px;
            background-color: #fffdf9;
        }

        .file-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
        }

        /* メインアクションボタン */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #74b3e6, #5fa3dc); /* 青いグラデーション */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(116, 179, 230, 0.3);
            transition: opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .submit-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 結果表示エリア関連 */
        .result-section {
            display: none; /* 初期状態は非表示、生成後にJSで表示 */
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-title {
            font-weight: bold;
            color: #1a2e40;
        }

        .copy-btn {
            background-color: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #555;
        }
        .copy-btn:hover {
            background-color: #e5e5e5;
        }

        .output-box {
            background-color: #fafafa;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            min-height: 80px;
            white-space: pre-wrap; /* 改行を有効にする */
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .points-list {
            margin: 0;
            padding-left: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lecture Audio Notes</h1>
        <p>講義の音声を、知識に変える。</p>
        <p>AIが文字起こしと要約を自動生成します。</p>
    </div>

    <div class="container">
        
        <div class="api-setting-wrapper">
            <button class="api-setting-btn" id="reset-api-btn">⚙ APIキーを再設定</button>
        </div>

        <div class="card">
            <h2>🎙 講義データの入力</h2>
            
            <div class="form-group">
                <label>講義名（任意）</label>
                <input type="text" class="input-text" id="lecture-name" placeholder="情報理論">
            </div>

            <div class="form-group">
                <label>音声ファイル</label>
                <div class="file-input-wrapper">
                    <input type="file" id="audio-input" accept="audio/*">
                    <div class="file-hint">※ 推奨: 20MB以下のMP3/WAV/M4Aファイル。長い講義は分割してください。</div>
                </div>
            </div>

            <button class="submit-btn" id="submit-btn">✨ AIノートを作成する</button>
        </div>

        <div class="result-section" id="result-section">
            
            <div class="card">
                <div class="result-header">
                    <div class="result-title">📝 文字起こし全文</div>
                    <button class="copy-btn" id="copy-transcript-btn">コピー</button>
                </div>
                <div class="output-box" id="transcript-output">ここに文字起こしが表示されます。</div>
            </div>

            <div class="card">
                <div class="result-header">
                    <div class="result-title">💡 講義の要約</div>
                    <button class="copy-btn" id="copy-summary-btn">コピー</button>
                </div>
                <div class="output-box" id="summary-output" style="margin-bottom: 20px;">ここに要約が表示されます。</div>

                <div class="result-title" style="margin-bottom: 10px;">📌 重要な要点</div>
                <div class="output-box">
                    <ul class="points-list" id="points-output">
                        <li>ここに要点が箇条書きで表示されます。</li>
                    </ul>
                </div>
            </div>

        </div>

    </div>

    <script>
        // --- 1. APIキーの管理 ---
        function saveApiKey(key) {
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert('APIキーを端末内に安全に保存しました。');
            }
        }

        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key');
            if (!key) {
                key = prompt('Gemini APIキーが見つかりません。キーを入力してください：\n（※キーはブラウザ内にのみ保存され、公開されません）');
                if (key) {
                    saveApiKey(key);
                }
            }
            return key;
        }

        // --- 2. 音声ファイルのBase64変換関数 ---
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // --- 3. Gemini API: 文字起こし処理 ---
        async function generateTranscript(audioFile, apiKey) {
            const base64Audio = await fileToBase64(audioFile);
            const mimeType = audioFile.type || 'audio/mp3'; // 判別できない場合はデフォルトmp3

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: "提供された音声ファイルを、一言一句正確に文字起こししてください。要約や挨拶などの余計なテキストは一切含めず、文字起こしの結果（テキスト）だけを出力してください。" },
                        { inlineData: { mimeType: mimeType, data: base64Audio } }
                    ]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) throw new Error('文字起こしAPIリクエストに失敗しました。');
            
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // --- 4. Gemini API: 要約・要点生成処理 ---
        async function generateSummary(transcriptText, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const promptText = `
以下の講義の文字起こしデータを元に、「全体の要約（150文字程度）」と「重要な要点（3〜5個の箇条書き）」を作成してください。

【文字起こしデータ】
${transcriptText}

【出力フォーマット】
必ず以下のJSON形式でのみ出力してください。前後の解説文やマークダウンの三連バッククォーツ（\`\`\`json）は一切含めない完全なJSONオブジェクトにしてください。
{
  "summary": "要約文をここに記述",
  "points": [
    "要点1",
    "要点2",
    "要点3"
  ]
}
`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });

            if (!response.ok) throw new Error('要約APIリクエストに失敗しました。');

            const data = await response.json();
            let rawJsonText = data.candidates[0].content.parts[0].text.trim();
            
            // AIがたまに出してしまう ```json ... ``` を除去する安全策
            if (rawJsonText.startsWith("```")) {
                rawJsonText = rawJsonText.replace(/^```json\s*/i, "").replace(/```$/, "").trim();
            }

            return JSON.parse(rawJsonText);
        }

        // --- 5. コピー機能 ---
        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('クリップボードにコピーしました！');
            }).catch(err => {
                alert('コピーに失敗しました。');
            });
        }

        // --- 6. イベントの紐付け（画面読み込み完了時） ---
        document.addEventListener('DOMContentLoaded', () => {
            const submitBtn = document.getElementById('submit-btn');
            const audioInput = document.getElementById('audio-input');
            const resultSection = document.getElementById('result-section');
            const transcriptOutput = document.getElementById('transcript-output');
            const summaryOutput = document.getElementById('summary-output');
            const pointsOutput = document.getElementById('points-output');

            // APIキーの再設定
            document.getElementById('reset-api-btn').addEventListener('click', () => {
                const newKey = prompt('新しいGeminiのAPIキーを入力してください：');
                if (newKey) saveApiKey(newKey);
            });

            // コピーボタン
            document.getElementById('copy-transcript-btn').addEventListener('click', () => copyText('transcript-output'));
            document.getElementById('copy-summary-btn').addEventListener('click', () => {
                // 要約と要点をまとめてコピー用テキストにする
                const summary = summaryOutput.innerText;
                const points = Array.from(pointsOutput.querySelectorAll('li')).map(li => `・${li.innerText}`).join('\n');
                navigator.clipboard.writeText(`【要約】\n${summary}\n\n【要点】\n${points}`).then(() => alert('要約と要点をコピーしました！'));
            });

            // メイン処理：作成ボタンクリック
            submitBtn.addEventListener('click', async () => {
                const apiKey = getApiKey();
                if (!apiKey) return;

                if (!audioInput.files || !audioInput.files[0]) {
                    alert('音声ファイルを選択してください。');
                    return;
                }

                const file = audioInput.files[0];

                // ボタンを「処理中」にして連打を防ぐ
                submitBtn.disabled = true;
                submitBtn.innerText = '⏳ AIが解析中（1〜2分かかる場合があります）...';

                try {
                    // ① 文字起こしを実行
                    const transcript = await generateTranscript(file, apiKey);
                    transcriptOutput.innerText = transcript;
                    
                    // 結果エリアを先に表示させる
                    resultSection.style.display = 'block';

                    // ② 要約を実行
                    const resultJson = await generateSummary(transcript, apiKey);
                    summaryOutput.innerText = resultJson.summary;

                    // 要点の箇条書きを生成
                    pointsOutput.innerHTML = '';
                    resultJson.points.forEach(point => {
                        const li = document.createElement('li');
                        li.innerText = point;
                        pointsOutput.appendChild(li);
                    });

                    alert('✨ AIノートが完成しました！');

                } catch (error) {
                    console.error(error);
                    alert('処理中にエラーが発生しました。ファイルの形式やサイズ、またはAPIキーが正しいか確認してください。');
                } finally {
                    // ボタンを元に戻す
                    submitBtn.disabled = false;
                    submitBtn.innerText = '✨ AIノートを作成する';
                }
            });
        });
    </script>
</body>
</html>
