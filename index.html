<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Audio Notes</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #fcf9f2;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .header {
            text-align: center;
            padding: 60px 20px 40px 20px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(252,249,242,1));
        }
        .header h1 {
            font-size: 2.5rem;
            color: #1a2e40;
            margin: 0 0 10px 0;
            font-weight: 700;
        }
        .header p {
            color: #666;
            margin: 5px 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
        }
        .api-setting-wrapper {
            text-align: right;
            margin-bottom: 20px;
        }
        .api-setting-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .api-setting-btn:hover {
            color: #333;
            text-decoration: underline;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .card h2 {
            font-size: 1.2rem;
            color: #1a2e40;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #333;
        }
        .input-text {
            width: 100%;
            padding: 12px;
            border: 1px solid #ebdcb9;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fffdf9;
            font-size: 1rem;
        }
        .file-input-wrapper {
            border: 1px solid #ebdcb9;
            padding: 15px;
            border-radius: 6px;
            background-color: #fffdf9;
        }
        .file-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #74b3e6, #5fa3dc);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(116, 179, 230, 0.3);
            transition: opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        .submit-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        .result-section {
            display: none;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-title {
            font-weight: bold;
            color: #1a2e40;
        }
        .copy-btn {
            background-color: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #555;
        }
        .copy-btn:hover {
            background-color: #e5e5e5;
        }
        .output-box {
            background-color: #fafafa;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            min-height: 80px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .points-list {
            margin: 0;
            padding-left: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lecture Audio Notes</h1>
        <p>講義の音声を、知識に変える。</p>
        <p>AIが文字起こしと要約を自動生成します。</p>
    </div>

    <div class="container">
        <div class="api-setting-wrapper">
            <button class="api-setting-btn" id="reset-api-btn">⚙ APIキーを再設定</button>
        </div>

        <div class="card">
            <h2>🎙 講義データの入力</h2>
            <div class="form-group">
                <label>講義名（任意）</label>
                <input type="text" class="input-text" id="lecture-name" placeholder="情報理論">
            </div>
            <div class="form-group">
                <label>音声または動画ファイル</label>
                <div class="file-input-wrapper">
                    <input type="file" id="audio-input" accept="audio/*,video/mp4,video/x-m4v,video/*">
                    <div class="file-hint">※ 推奨: 20MB以下のMP3/WAV/M4A/MP4ファイル。</div>
                </div>
            </div>
            <button class="submit-btn" id="submit-btn">✨ AIノートを作成する</button>
        </div>

        <div class="result-section" id="result-section">
            <div class="card">
                <div class="result-header">
                    <div class="result-title">📝 文字起こし全文</div>
                    <button class="copy-btn" id="copy-transcript-btn">コピー</button>
                </div>
                <div class="output-box" id="transcript-output">ここに文字起こしが表示されます。</div>
            </div>
            <div class="card">
                <div class="result-header">
                    <div class="result-title">💡 講義の要約</div>
                    <button class="copy-btn" id="copy-summary-btn">コピー</button>
                </div>
                <div class="output-box" id="summary-output" style="margin-bottom: 20px;">ここに要約が表示されます。</div>
                <div class="result-title" style="margin-bottom: 10px;">📌 重要な要点</div>
                <div class="output-box">
                    <ul class="points-list" id="points-output">
                        <li>ここに要点が箇記事で表示されます。</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function saveApiKey(key) {
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert('APIキーを保存しました。');
            }
        }

        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key');
            if (!key) {
                key = prompt('Gemini APIキーを入力してください：');
                if (key) saveApiKey(key);
            }
            return key;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // --- ★公式ドキュメントに完全に準拠した最新の推奨指定に変更 ---
        async function generateTranscript(audioFile, apiKey) {
            const base64Audio = await fileToBase64(audioFile);
            let mimeType = audioFile.type || 'audio/mp3';

            // 最新の標準エンドポイント（v1beta）と現行のプロダクション推奨Stableモデル「gemini-2.5-flash」を使用
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: "提供された講義ファイルから、日本語で正確に文字起こしを行ってください。結果のテキストのみを出力してください。" },
                        { inlineData: { mimeType: mimeType, data: base64Audio } }
                    ]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) {
                const errData = await response.json();
                console.error('APIエラー詳細:', errData);
                throw new Error('文字起こしに失敗しました。');
            }
            
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function generateSummary(transcriptText, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            const promptText = `
以下の講義の文字起こしデータを元に、「全体の要約（150文字程度）」と「重要な要点（3〜5個の箇条書き）」を作成してください。

【文字起こしデータ】
${transcriptText}

【出力フォーマット】
必ず以下のJSON形式でのみ出力してください。
{
  "summary": "要約文",
  "points": ["要点1", "要点2", "要点3"]
}
`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });

            if (!response.ok) throw new Error('要約に失敗しました。');

            const data = await response.json();
            let rawJsonText = data.candidates[0].content.parts[0].text.trim();
            
            if (rawJsonText.startsWith("```")) {
                rawJsonText = rawJsonText.replace(/^```json\s*/i, "").replace(/```$/, "").trim();
            }

            return JSON.parse(rawJsonText);
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const submitBtn = document.getElementById('submit-btn');
            const audioInput = document.getElementById('audio-input');
            const resultSection = document.getElementById('result-section');
            const transcriptOutput = document.getElementById('transcript-output');
            const summaryOutput = document.getElementById('summary-output');
            const pointsOutput = document.getElementById('points-output');

            document.getElementById('reset-api-btn').addEventListener('click', () => {
                const newKey = prompt('新しいGemini APIキーを入力してください：');
                if (newKey) saveApiKey(newKey);
            });

            document.getElementById('copy-transcript-btn').addEventListener('click', () => copyText('transcript-output'));
            document.getElementById('copy-summary-btn').addEventListener('click', () => {
                const summary = summaryOutput.innerText;
                const points = Array.from(pointsOutput.querySelectorAll('li')).map(li => `・${li.innerText}`).
